<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — MediFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/mediflow-brand.css"/>
  <link rel="icon" href="/assets/mediflow-logo-icon.png" type="image/png"/>
  <style>
    :root{
      --teal:#0d6b6e;--teal-dk:#094a4c;--teal-md:#0f8a8e;--teal-lt:#e0f4f4;
      --amber:#e8870a;--amber-lt:#fef3e2;
      --green:#1a7a4a;--green-lt:#e3f5ec;
      --red:#c0392b;--red-lt:#fdecea;
      --bg:#f0f4f5;--surface:#ffffff;--surface2:#f7fafa;
      --sidebar-bg:#0a3d3f;--sidebar-w:240px;
      --text:#0f2b2d;--text-2:#3a5a5c;--muted:#7a9ea0;
      --border:#d4e6e7;--border-dk:#b8d4d5;
      --shadow-sm:0 1px 4px rgba(13,107,110,.08);
      --radius:12px;--radius-sm:8px;--radius-lg:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

    .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200}
    .sidebar::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:28px 28px}
    .sidebar-logo{padding:1.4rem 1.25rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.06)}
    .logo-mark{display:flex;align-items:center;gap:.6rem;text-decoration:none}
    .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#0f8a8e,#0aa8ad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 12px rgba(13,168,173,.4);flex-shrink:0}
    .logo-text{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:-.02em}
    .logo-sub{font-size:.6rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em}
    .sidebar-user{margin:.9rem .85rem .25rem;padding:.7rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);display:flex;align-items:center;gap:.55rem}
    .user-avatar{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--amber),#f5a623);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
    .user-name-s{font-size:.78rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role{font-size:.65rem;color:rgba(255,255,255,.35)}
    .sidebar-nav{flex:1;padding:.4rem 0;overflow-y:auto}
    .nav-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);padding:.85rem 1.25rem .3rem}
    .nav-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .9rem .55rem 1.25rem;margin:.08rem .65rem;border-radius:var(--radius-sm);text-decoration:none;color:rgba(255,255,255,.5);font-size:.82rem;font-weight:500;transition:all .16s;position:relative}
    .nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
    .nav-item.active{background:rgba(15,138,142,.22);color:#fff;font-weight:600}
    .nav-item.active::before{content:'';position:absolute;left:2px;top:22%;bottom:22%;width:3px;background:#0aa8ad;border-radius:2px}
    .nav-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.82rem;background:rgba(255,255,255,.06);flex-shrink:0}
    .nav-item.active .nav-icon{background:rgba(15,138,142,.35)}
    .sidebar-footer{padding:.7rem;border-top:1px solid rgba(255,255,255,.06)}
    .btn-logout{width:100%;display:flex;align-items:center;gap:.55rem;padding:.55rem .85rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);color:rgba(255,255,255,.4);font-size:.78rem;font-weight:500;font-family:inherit;cursor:pointer;transition:all .18s}
    .btn-logout:hover{background:rgba(192,57,43,.2);border-color:rgba(192,57,43,.35);color:#ff8a80}

    .main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
    .topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;box-shadow:var(--shadow-sm)}
    .topbar-title{font-family:'Sora',sans-serif;font-size:.98rem;font-weight:600;color:var(--text)}
    .content{flex:1;padding:2rem;max-width:1000px}

    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeUp .3s ease}
    .panel-head{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
    .panel-title{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.4rem}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .hist-tabs{display:flex;gap:.5rem;padding:1rem 1.4rem 0;border-bottom:1px solid var(--border);background:var(--surface2)}
    .hist-tab{padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:.82rem;font-weight:600;font-family:inherit;color:var(--text-2);cursor:pointer;transition:all .16s}
    .hist-tab:hover{border-color:var(--teal-md);color:var(--teal-dk)}
    .hist-tab.active{background:var(--teal);border-color:var(--teal);color:#fff}
    .hist-tab .tab-count{font-size:.7rem;opacity:.85;margin-left:.35rem}

    .hist-section{display:none}
    .hist-section.active{display:block}

    .hist-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .hist-table th{text-align:left;padding:.65rem 1.4rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
    .hist-table th.num{text-align:right}
    .hist-table td{padding:.75rem 1.4rem;border-bottom:1px solid var(--border);vertical-align:middle}
    .hist-table tr:last-child td{border-bottom:none}
    .hist-table tr:hover td{background:var(--teal-lt)}
    .hist-table td.num{text-align:right;font-variant-numeric:tabular-nums}
    .med-name{font-weight:600;color:var(--text)}
    .med-barcode{font-size:.73rem;color:var(--muted);margin-top:.15rem;font-family:monospace}
    .badge-sold{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.68rem;font-weight:700;background:var(--green-lt);color:var(--green)}
    .badge-restock{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.68rem;font-weight:700;background:var(--amber-lt);color:#a85f00}
    .hist-time{font-size:.72rem;color:var(--muted);white-space:nowrap}

    .hist-empty{padding:3rem;text-align:center;color:var(--muted)}
    .hist-empty .empty-icon{font-size:2.2rem;margin-bottom:.65rem}
    .hist-empty p{font-size:.85rem;line-height:1.6}

    .btn-refresh{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;background:var(--teal-lt);color:var(--teal-dk);border:1px solid var(--border-dk);border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .18s}
    .btn-refresh:hover{border-color:var(--teal-md)}
    .count-badge{font-size:.72rem;background:var(--teal-lt);color:var(--teal-dk);padding:.18rem .6rem;border-radius:999px;font-weight:700}
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <a class="logo-mark" href="index.html">
      <div class="logo-icon"></div>
      <div><div class="logo-text">MediFlow</div><div class="logo-sub">Your own Pharmacy</div></div>
    </a>
  </div>
  <div class="sidebar-user">
    <div class="user-avatar" id="sb-avatar">?</div>
    <div><div class="user-name-s" id="sb-name">…</div><div class="user-role">Pharmacist</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="index.html"><div class="nav-icon">🏠</div>Dashboard</a>
    <a class="nav-item" href="billing.html"><div class="nav-icon">🧾</div>Billing</a>
    <div class="nav-label">Inventory</div>
    <a class="nav-item" href="add-medicine.html"><div class="nav-icon">➕</div>Add Medicine</a>
    <a class="nav-item" href="restock.html"><div class="nav-icon">♻️</div>Restock</a>
    <a class="nav-item active" href="history.html"><div class="nav-icon">📜</div>History</a>
    <a class="nav-item" href="order.html"><div class="nav-icon">📋</div>Order</a>
    <div class="nav-label">Tools</div>
    <a class="nav-item" href="scanner.html"><div class="nav-icon">📷</div>Camera Scanner</a>
    <a class="nav-item" href="activity-log.html"><div class="nav-icon">📋</div>Activity Log</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="doLogout()"><span>🚪</span>Sign Out</button>
  </div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-title">📜 History</div>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Stock movement history</div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span class="count-badge" id="hist-summary">Loading…</span>
          <button class="btn-refresh" onclick="loadHistory()">↻ Refresh</button>
        </div>
      </div>

      <div class="hist-tabs">
        <button type="button" class="hist-tab active" data-tab="sold" onclick="switchTab('sold')">
          🛒 SOLD<span class="tab-count" id="sold-count">0</span>
        </button>
        <button type="button" class="hist-tab" data-tab="restocked" onclick="switchTab('restocked')">
          ♻️ RESTOCKED<span class="tab-count" id="restocked-count">0</span>
        </button>
      </div>

      <div id="section-sold" class="hist-section active">
        <div id="sold-body">
          <div class="hist-empty"><div class="empty-icon">⏳</div><p>Loading sold history…</p></div>
        </div>
      </div>

      <div id="section-restocked" class="hist-section">
        <div id="restocked-body">
          <div class="hist-empty"><div class="empty-icon">⏳</div><p>Loading restock history…</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let activeTab = 'sold';

  fetch('/me').then(r=>r.json()).then(d=>{
    if(!d.loggedIn){window.location.href='/login.html';return;}
    document.getElementById('sb-name').textContent=d.name;
    document.getElementById('sb-avatar').textContent=d.name.charAt(0).toUpperCase();
  });
  function doLogout(){fetch('/logout',{method:'POST'}).then(()=>window.location.href='/login.html');}

  function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function formatDate(dateStr){
    return new Date(dateStr).toLocaleString('en-IN',{
      day:'2-digit',month:'short',year:'numeric',
      hour:'2-digit',minute:'2-digit',hour12:true
    });
  }

  function formatExpiry(dateStr){
    if(!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  }

  function switchTab(tab){
    activeTab = tab;
    document.querySelectorAll('.hist-tab').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.getElementById('section-sold').classList.toggle('active', tab === 'sold');
    document.getElementById('section-restocked').classList.toggle('active', tab === 'restocked');
  }

  function renderSold(rows){
    const el = document.getElementById('sold-body');
    if(!rows.length){
      el.innerHTML='<div class="hist-empty"><div class="empty-icon">🛒</div><p>No medicines sold yet.<br/>Sales are recorded when you print a receipt from Billing.</p></div>';
      return;
    }
    el.innerHTML=`<table class="hist-table">
      <thead><tr>
        <th>Medicine</th><th class="num">Qty</th><th class="num">Rate</th><th class="num">Total</th><th>When</th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>
          <div class="med-name">${esc(r.medicineName)}</div>
          <div class="med-barcode">${esc(r.barcode)}</div>
          ${r.patientName ? `<div style="margin-top: .4rem; font-size: .72rem; color: var(--text-2); background: var(--surface2); padding: .3rem .5rem; border-radius: 4px; display: inline-block; border: 1px solid var(--border);">👤 <strong>${esc(r.patientName)}</strong>${r.patientAge ? `, Age ${r.patientAge}` : ''}${r.patientPhone ? ` &nbsp;📞 ${esc(r.patientPhone)}` : ''}</div>` : ''}
        </td>
        <td class="num">${r.quantity}</td>
        <td class="num">₹${Number(r.unitPrice||0).toFixed(2)}</td>
        <td class="num"><strong>₹${Number(r.lineTotal||0).toFixed(2)}</strong></td>
        <td class="hist-time">${formatDate(r.createdAt)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  function renderRestocked(rows){
    const el = document.getElementById('restocked-body');
    if(!rows.length){
      el.innerHTML='<div class="hist-empty"><div class="empty-icon">♻️</div><p>No restocks recorded yet.<br/>Restocks are logged when you add stock on the Restock page.</p></div>';
      return;
    }
    el.innerHTML=`<table class="hist-table">
      <thead><tr>
        <th>Medicine</th><th class="num">Qty added</th><th>Expiry</th><th>When</th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td><div class="med-name">${esc(r.medicineName)}</div><div class="med-barcode">${esc(r.barcode)}</div></td>
        <td class="num"><span class="badge-restock">+${r.quantity}</span></td>
        <td>${formatExpiry(r.expiryDate)}</td>
        <td class="hist-time">${formatDate(r.createdAt)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  async function loadHistory(){
    const summary = document.getElementById('hist-summary');
    summary.textContent = 'Loading…';
    try{
      const res = await fetch('/stock-history');
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Failed to load');

      const sold = Array.isArray(data.sold) ? data.sold : [];
      const restocked = Array.isArray(data.restocked) ? data.restocked : [];

      document.getElementById('sold-count').textContent = sold.length;
      document.getElementById('restocked-count').textContent = restocked.length;
      summary.textContent = `${sold.length} sold · ${restocked.length} restocked`;

      renderSold(sold);
      renderRestocked(restocked);
    }catch(e){
      const err = '<div class="hist-empty"><div class="empty-icon">❌</div><p>Could not load history.<br/>Make sure the server is running.</p></div>';
      document.getElementById('sold-body').innerHTML = err;
      document.getElementById('restocked-body').innerHTML = err;
      summary.textContent = 'Error';
    }
  }

  loadHistory();
  // Auto-switch to RESTOCKED tab if navigated here with #restocked
  if (window.location.hash === '#restocked') switchTab('restocked');
  setInterval(loadHistory, 30000);
  // Reload whenever the tab becomes visible again (e.g. navigating back from restock)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadHistory();
  });
</script>
<script src="/js/mediflow-brand.js"></script>
</body>
</html>
