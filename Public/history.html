<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — MediFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/mediflow-brand.css"/>
  <link rel="icon" href="/assets/mediflow-logo-icon.png" type="image/png"/>
  <style>
    :root{
      --teal:#0d6b6e;--teal-dk:#094a4c;--teal-md:#0f8a8e;--teal-lt:#e0f4f4;
      --amber:#e8870a;--amber-lt:#fef3e2;
      --green:#1a7a4a;--green-lt:#e3f5ec;
      --red:#c0392b;--red-lt:#fdecea;
      --bg:#f0f4f5;--surface:#ffffff;--surface2:#f7fafa;
      --sidebar-bg:#0a3d3f;--sidebar-w:240px;
      --text:#0f2b2d;--text-2:#3a5a5c;--muted:#7a9ea0;
      --border:#d4e6e7;--border-dk:#b8d4d5;
      --shadow-sm:0 1px 4px rgba(13,107,110,.08);
      --radius:12px;--radius-sm:8px;--radius-lg:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

    .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200}
    .sidebar::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:28px 28px}
    .sidebar-logo{padding:1.4rem 1.25rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.06)}
    .logo-mark{display:flex;align-items:center;gap:.6rem;text-decoration:none}
    .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#0f8a8e,#0aa8ad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 12px rgba(13,168,173,.4);flex-shrink:0}
    .logo-text{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:-.02em}
    .logo-sub{font-size:.6rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em}
    .sidebar-user{margin:.9rem .85rem .25rem;padding:.7rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);display:flex;align-items:center;gap:.55rem}
    .user-avatar{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--amber),#f5a623);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
    .user-name-s{font-size:.78rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role{font-size:.65rem;color:rgba(255,255,255,.35)}
    .sidebar-nav{flex:1;padding:.4rem 0;overflow-y:auto}
    .nav-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);padding:.85rem 1.25rem .3rem}
    .nav-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .9rem .55rem 1.25rem;margin:.08rem .65rem;border-radius:var(--radius-sm);text-decoration:none;color:rgba(255,255,255,.5);font-size:.82rem;font-weight:500;transition:all .16s;position:relative}
    .nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
    .nav-item.active{background:rgba(15,138,142,.22);color:#fff;font-weight:600}
    .nav-item.active::before{content:'';position:absolute;left:2px;top:22%;bottom:22%;width:3px;background:#0aa8ad;border-radius:2px}
    .nav-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.82rem;background:rgba(255,255,255,.06);flex-shrink:0}
    .nav-item.active .nav-icon{background:rgba(15,138,142,.35)}
    .sidebar-footer{padding:.7rem;border-top:1px solid rgba(255,255,255,.06)}
    .btn-logout{width:100%;display:flex;align-items:center;gap:.55rem;padding:.55rem .85rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);color:rgba(255,255,255,.4);font-size:.78rem;font-weight:500;font-family:inherit;cursor:pointer;transition:all .18s}
    .btn-logout:hover{background:rgba(192,57,43,.2);border-color:rgba(192,57,43,.35);color:#ff8a80}

    .main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
    .topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;box-shadow:var(--shadow-sm)}
    .topbar-title{font-family:'Sora',sans-serif;font-size:.98rem;font-weight:600;color:var(--text)}
    .content{flex:1;padding:2rem;max-width:1000px}

    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeUp .3s ease}
    .panel-head{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
    .panel-title{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.4rem}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .hist-tabs{display:flex;gap:.5rem;padding:1rem 1.4rem 0;border-bottom:1px solid var(--border);background:var(--surface2)}
    .hist-tab{padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:.82rem;font-weight:600;font-family:inherit;color:var(--text-2);cursor:pointer;transition:all .16s}
    .hist-tab:hover{border-color:var(--teal-md);color:var(--teal-dk)}
    .hist-tab.active{background:var(--teal);border-color:var(--teal);color:#fff}
    .hist-tab .tab-count{font-size:.7rem;opacity:.85;margin-left:.35rem}

    .hist-section{display:none}
    .hist-section.active{display:block}

    .hist-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .hist-table th{text-align:left;padding:.65rem 1.4rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
    .hist-table th.num{text-align:right}
    .hist-table td{padding:.75rem 1.4rem;border-bottom:1px solid var(--border);vertical-align:middle}
    .hist-table tr:last-child td{border-bottom:none}
    .hist-table tr:hover td{background:var(--teal-lt)}
    .hist-table td.num{text-align:right;font-variant-numeric:tabular-nums}
    .med-name{font-weight:600;color:var(--text)}
    .med-barcode{font-size:.73rem;color:var(--muted);margin-top:.15rem;font-family:monospace}
    .badge-sold{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.68rem;font-weight:700;background:var(--green-lt);color:var(--green)}
    .badge-restock{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.68rem;font-weight:700;background:var(--amber-lt);color:#a85f00}
    .hist-time{font-size:.72rem;color:var(--muted);white-space:nowrap}

    .hist-empty{padding:3rem;text-align:center;color:var(--muted)}
    .hist-empty .empty-icon{font-size:2.2rem;margin-bottom:.65rem}
    .hist-empty p{font-size:.85rem;line-height:1.6}

    .btn-refresh{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;background:var(--teal-lt);color:var(--teal-dk);border:1px solid var(--border-dk);border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .18s}
    .btn-refresh:hover{border-color:var(--teal-md)}
    .count-badge{font-size:.72rem;background:var(--teal-lt);color:var(--teal-dk);padding:.18rem .6rem;border-radius:999px;font-weight:700}

    /* ── Search bar ── */
    .search-bar-wrap{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:.75rem}
    .search-bar{flex:1;padding:.55rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.86rem;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .search-bar:focus{border-color:var(--teal-md);box-shadow:0 0 0 3px rgba(13,138,142,.1)}
    .search-clear{padding:.45rem .7rem;border:1.5px solid var(--border-dk);border-radius:var(--radius-sm);background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .16s;white-space:nowrap}
    .search-clear:hover{background:var(--red-lt);border-color:var(--red);color:var(--red)}
    .search-results-count{font-size:.75rem;color:var(--muted);white-space:nowrap}

    /* ── Bill card (grouped) ── */
    .bill-card{border:1px solid var(--border);border-radius:var(--radius);margin:.9rem 1.4rem;overflow:hidden;transition:box-shadow .18s}
    .bill-card:hover{box-shadow:0 4px 16px rgba(13,107,110,.1)}
    .bill-card-head{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);gap:.75rem;min-height:52px}
    .bill-patient{flex:1;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;min-width:0}
    .bill-patient-name{font-weight:700;font-size:.88rem;color:var(--text);white-space:nowrap}
    .bill-patient-meta{font-size:.75rem;color:var(--muted);white-space:nowrap}
    .bill-anon{font-size:.82rem;color:var(--muted);font-style:italic}
    .bill-meta-right{display:flex;align-items:center;gap:.75rem;flex-shrink:0;flex-wrap:nowrap}
    .bill-time{font-size:.74rem;color:var(--muted);white-space:nowrap;min-width:130px;text-align:right}
    .bill-total{font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;color:var(--teal-dk);min-width:64px;text-align:right;white-space:nowrap}
    .btn-view-receipt{display:inline-flex;align-items:center;gap:.3rem;padding:.32rem .75rem;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:.74rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .16s;white-space:nowrap}
    .btn-view-receipt:hover{background:var(--teal-md);transform:translateY(-1px)}
    .bill-items-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .bill-items-table th{text-align:left;padding:.5rem 1rem;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
    .bill-items-table th.num{text-align:right}
    .bill-items-table td{padding:.65rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle}
    .bill-items-table tr:last-child td{border-bottom:none}
    .bill-items-table td.num{text-align:right;font-variant-numeric:tabular-nums}
    .bill-items-table tr:hover td{background:var(--teal-lt)}

    /* ── Receipt Modal ── */
    .rcpt-backdrop{position:fixed;inset:0;background:rgba(5,20,22,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s}
    .rcpt-backdrop.open{opacity:1;pointer-events:auto}
    .rcpt-modal{background:#fff;border-radius:16px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.25);transform:translateY(16px) scale(.98);transition:transform .25s,opacity .25s;opacity:0;display:flex;flex-direction:column;max-height:92vh;overflow:hidden}
    .rcpt-backdrop.open .rcpt-modal{transform:translateY(0) scale(1);opacity:1}
    .rcpt-modal-head{padding:1rem 1.3rem;border-bottom:1px solid #e0e8e8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#f7fafa}
    .rcpt-modal-title{font-family:'Sora',sans-serif;font-size:.92rem;font-weight:700;color:var(--text)}
    .rcpt-modal-close{background:none;border:none;font-size:1.2rem;color:var(--muted);cursor:pointer;padding:.2rem .4rem;border-radius:6px;line-height:1}
    .rcpt-modal-close:hover{background:var(--red-lt);color:var(--red)}
    .rcpt-modal-body{padding:1.2rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:.75rem}
    .rcpt-preview-wrap{border:1px solid #d0d8d8;border-radius:10px;overflow:hidden;background:#fff}
    .rcpt-actions{display:flex;gap:.6rem}
    .rcpt-print-btn{flex:1;padding:.65rem;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.4rem}
    .rcpt-print-btn:hover{background:var(--teal-md);transform:translateY(-1px)}
    .rcpt-cancel-btn{padding:.65rem 1rem;background:transparent;color:var(--text-2);border:1.5px solid var(--border-dk);border-radius:8px;font-size:.88rem;font-weight:600;font-family:inherit;cursor:pointer}
    .rcpt-cancel-btn:hover{background:var(--surface2)}

    /* ── Thermal Receipt inside modal ── */
    .receipt{width:100%;font-family:'Courier New',Courier,monospace;font-size:11.5px;line-height:1.5;color:#000;background:#fff;padding:10px 12px}
    .receipt-header{text-align:center;margin-bottom:5px}
    .receipt-header h1{font-size:17px;font-weight:900;letter-spacing:2px;margin:0 0 2px}
    .receipt-header .sub{font-size:9.5px;color:#444}
    .receipt-dash{border:none;border-top:1px dashed #888;margin:6px 0}
    .receipt-datetime{text-align:center;font-size:9.5px;color:#555;margin-bottom:4px}
    .receipt-patient{font-size:9.5px;color:#333;margin-bottom:4px;text-align:center}
    .receipt-col-head{display:flex;font-weight:bold;font-size:9.5px;border-bottom:1px solid #000;padding-bottom:2px;margin-bottom:3px}
    .rch-name{flex:1}.rch-qty{width:26px;text-align:center}.rch-price{width:44px;text-align:right}.rch-total{width:50px;text-align:right}
    .receipt-item{display:flex;align-items:flex-start;margin:2px 0;font-size:11px}
    .ri-name{flex:1;word-break:break-word;line-height:1.3}.ri-qty{width:26px;text-align:center;flex-shrink:0}.ri-price{width:44px;text-align:right;flex-shrink:0}.ri-total{width:50px;text-align:right;flex-shrink:0;font-weight:600}
    .receipt-summary{font-size:9.5px;color:#444}
    .receipt-row{display:flex;justify-content:space-between;margin:1px 0}
    .receipt-grand{display:flex;justify-content:space-between;font-weight:900;font-size:14px;margin-top:4px;padding-top:4px;border-top:2px solid #000}
    .receipt-footer{text-align:center;font-size:9.5px;color:#555;margin-top:4px;line-height:1.6}
    .receipt-rcptno{text-align:center;font-size:8.5px;color:#999;margin-top:4px}

    @media print{
      body>*{display:none!important}
      #rcpt-print-only{display:block!important;font-family:'Courier New',Courier,monospace}
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <a class="logo-mark" href="index.html">
      <div class="logo-icon"></div>
      <div><div class="logo-text">MediFlow</div><div class="logo-sub">Your own Pharmacy</div></div>
    </a>
  </div>
  <div class="sidebar-user">
    <div class="user-avatar" id="sb-avatar">?</div>
    <div><div class="user-name-s" id="sb-name">…</div><div class="user-role">Pharmacist</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="index.html"><div class="nav-icon">🏠</div>Dashboard</a>
    <a class="nav-item" href="billing.html"><div class="nav-icon">🧾</div>Billing</a>
    <div class="nav-label">Inventory</div>
    <a class="nav-item" href="add-medicine.html"><div class="nav-icon">➕</div>Add Medicine</a>
    <a class="nav-item" href="restock.html"><div class="nav-icon">♻️</div>Restock</a>
    <a class="nav-item active" href="history.html"><div class="nav-icon">📜</div>History</a>
    <a class="nav-item" href="orders.html"><div class="nav-icon">📋</div>Order</a>
    <div class="nav-label">Tools</div>
    <a class="nav-item" href="scanner.html"><div class="nav-icon">📷</div>Camera Scanner</a>
    <a class="nav-item" href="activity-log.html"><div class="nav-icon">📋</div>Activity Log</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="doLogout()"><span>🚪</span>Sign Out</button>
  </div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-title">📜 History</div>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Stock movement history</div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span class="count-badge" id="hist-summary">Loading…</span>
          <button class="btn-refresh" onclick="loadHistory()">↻ Refresh</button>
        </div>
      </div>

      <!-- Search bar — filters by patient name, phone, or medicine name -->
      <div class="search-bar-wrap">
        <input class="search-bar" type="text" id="hist-search" placeholder="🔍  Search by patient name, phone, or medicine…" oninput="filterBills()"/>
        <button class="search-clear" onclick="clearSearch()">✕ Clear</button>
        <span class="search-results-count" id="search-results-count"></span>
      </div>

      <div class="hist-tabs">
        <button type="button" class="hist-tab active" data-tab="sold" onclick="switchTab('sold')">
          🛒 SOLD<span class="tab-count" id="sold-count">0</span>
        </button>
        <button type="button" class="hist-tab" data-tab="restocked" onclick="switchTab('restocked')">
          ♻️ RESTOCKED<span class="tab-count" id="restocked-count">0</span>
        </button>
      </div>

      <div id="section-sold" class="hist-section active">
        <div id="sold-body">
          <div class="hist-empty"><div class="empty-icon">⏳</div><p>Loading sold history…</p></div>
        </div>
      </div>

      <div id="section-restocked" class="hist-section">
        <div id="restocked-body">
          <div class="hist-empty"><div class="empty-icon">⏳</div><p>Loading restock history…</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let activeTab = 'sold';
  let _allBills = [];       // all grouped bills from server
  let _restocked = [];      // restock rows
  let _pharmacyInfo = { name: 'MediFlow Pharmacy', phone: '', address: '', email: '', license: '' };

  // ── Auth ────────────────────────────────────────────────
  fetch('/me').then(r=>r.json()).then(d=>{
    if(!d.loggedIn){window.location.href='/login.html';return;}
    document.getElementById('sb-name').textContent=d.name;
    document.getElementById('sb-avatar').textContent=d.name.charAt(0).toUpperCase();
    // /me does NOT return pharmacy fields — load them from /profile
    fetch('/profile').then(r=>r.json()).then(p=>{
      if(p && !p.error){
        _pharmacyInfo.name    = p.pharmacyName    || (d.name + ' Pharmacy');
        _pharmacyInfo.phone   = p.pharmacyPhone   || '';
        _pharmacyInfo.address = p.pharmacyAddress || '';
        _pharmacyInfo.email   = p.pharmacyEmail   || '';
        _pharmacyInfo.license = p.pharmacyLicense || '';
      } else {
        _pharmacyInfo.name = d.name + ' Pharmacy';
      }
    }).catch(()=>{ _pharmacyInfo.name = d.name + ' Pharmacy'; });
  });
  function doLogout(){fetch('/logout',{method:'POST'}).then(()=>window.location.href='/login.html');}

  function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function formatDate(dateStr){
    return new Date(dateStr).toLocaleString('en-IN',{
      day:'2-digit',month:'short',year:'numeric',
      hour:'2-digit',minute:'2-digit',hour12:true
    });
  }
  function formatExpiry(dateStr){
    if(!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  }

  function switchTab(tab){
    activeTab = tab;
    document.querySelectorAll('.hist-tab').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.getElementById('section-sold').classList.toggle('active', tab === 'sold');
    document.getElementById('section-restocked').classList.toggle('active', tab === 'restocked');
  }

  // ── Search / filter ──────────────────────────────────────
  function filterBills() {
    const q = document.getElementById('hist-search').value.trim().toLowerCase();
    if (!q) {
      renderBills(_allBills);
      document.getElementById('search-results-count').textContent = '';
      return;
    }
    const filtered = _allBills.filter(bill => {
      const name  = (bill.patientName  || '').toLowerCase();
      const phone = (bill.patientPhone || '').toLowerCase();
      const meds  = bill.items.map(i => i.medicineName.toLowerCase()).join(' ');
      return name.includes(q) || phone.includes(q) || meds.includes(q);
    });
    renderBills(filtered);
    document.getElementById('search-results-count').textContent =
      filtered.length === _allBills.length ? '' : `${filtered.length} of ${_allBills.length} bills`;
  }

  function clearSearch() {
    document.getElementById('hist-search').value = '';
    filterBills();
  }

  // ── Render grouped bills ────────────────────────────────
  function renderBills(bills) {
    const el = document.getElementById('sold-body');
    if (!bills.length) {
      el.innerHTML = '<div class="hist-empty"><div class="empty-icon">🛒</div><p>No bills found.<br/>Sales are recorded when you print a receipt from Billing.</p></div>';
      return;
    }

    el.innerHTML = bills.map((bill, i) => {
      const patientHtml = bill.patientName
        ? `<div class="bill-patient">
            <span class="bill-patient-name">👤 ${esc(bill.patientName)}</span>
            ${bill.patientAge  ? `<span class="bill-patient-meta">Age ${bill.patientAge}</span>` : ''}
            ${bill.patientPhone ? `<span class="bill-patient-meta">📞 ${esc(bill.patientPhone)}</span>` : ''}
           </div>`
        : `<span class="bill-anon">Anonymous patient</span>`;

      const itemRows = bill.items.map(item => `
        <tr>
          <td><div class="med-name">${esc(item.medicineName)}</div><div class="med-barcode">${esc(item.barcode)}</div></td>
          <td class="num">${item.quantity}</td>
          <td class="num">₹${Number(item.unitPrice||0).toFixed(2)}</td>
          <td class="num"><strong>₹${Number(item.lineTotal||0).toFixed(2)}</strong></td>
        </tr>`).join('');

      return `
        <div class="bill-card">
          <div class="bill-card-head">
            ${patientHtml}
            <div class="bill-meta-right">
              <span class="bill-time">${formatDate(bill.createdAt)}</span>
              <span class="bill-total">₹${Number(bill.grandTotal||0).toFixed(2)}</span>
              <button class="btn-view-receipt" onclick="viewReceipt(${i})">🖨️ Print Receipt</button>
            </div>
          </div>
          <table class="bill-items-table">
            <thead><tr>
              <th>Medicine</th><th class="num">Qty</th><th class="num">Rate</th><th class="num">Total</th>
            </tr></thead>
            <tbody>${itemRows}</tbody>
          </table>
        </div>`;
    }).join('');

    // Store for viewReceipt
    window._displayedBills = bills;
  }

  function renderRestocked(rows){
    const el = document.getElementById('restocked-body');
    if(!rows.length){
      el.innerHTML='<div class="hist-empty"><div class="empty-icon">♻️</div><p>No restocks recorded yet.<br/>Restocks are logged when you add stock on the Restock page.</p></div>';
      return;
    }
    el.innerHTML=`<table class="hist-table">
      <thead><tr>
        <th>Medicine</th><th class="num">Qty added</th><th>Expiry</th><th>When</th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td><div class="med-name">${esc(r.medicineName)}</div><div class="med-barcode">${esc(r.barcode)}</div></td>
        <td class="num"><span class="badge-restock">+${r.quantity}</span></td>
        <td>${formatExpiry(r.expiryDate)}</td>
        <td class="hist-time">${formatDate(r.createdAt)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  async function loadHistory(){
    const summary = document.getElementById('hist-summary');
    summary.textContent = 'Loading…';
    try{
      const res  = await fetch('/stock-history');
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Failed to load');

      _allBills  = Array.isArray(data.bills)     ? data.bills     : [];
      _restocked = Array.isArray(data.restocked)  ? data.restocked : [];

      const totalSoldItems = _allBills.reduce((s, b) => s + b.items.length, 0);
      document.getElementById('sold-count').textContent      = _allBills.length;
      document.getElementById('restocked-count').textContent = _restocked.length;
      summary.textContent = `${_allBills.length} bills · ${_restocked.length} restocked`;

      filterBills();   // respects active search
      renderRestocked(_restocked);
    }catch(e){
      const err = '<div class="hist-empty"><div class="empty-icon">❌</div><p>Could not load history.<br/>Make sure the server is running.</p></div>';
      document.getElementById('sold-body').innerHTML = err;
      document.getElementById('restocked-body').innerHTML = err;
      summary.textContent = 'Error';
    }
  }

  // ── Receipt Modal ───────────────────────────────────────
  function viewReceipt(billIdx) {
    const bill = (window._displayedBills || _allBills)[billIdx];
    if (!bill) return;

    const dateStr = new Date(bill.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr = new Date(bill.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    const rcptNo  = 'MF-' + String(bill.billId || Date.now()).slice(-7).toUpperCase();

    const patientLine = bill.patientName
      ? `<div class="receipt-patient">&#128100; ${esc(bill.patientName)}${bill.patientAge ? ', Age ' + bill.patientAge : ''}</div>`
      : '';

    const pharmacyLines = [
      _pharmacyInfo.address ? _pharmacyInfo.address            : '',
      _pharmacyInfo.phone   ? 'Tel: ' + _pharmacyInfo.phone   : '',
      _pharmacyInfo.email   ? _pharmacyInfo.email              : '',
      _pharmacyInfo.license ? 'Lic: ' + _pharmacyInfo.license : '',
    ].filter(Boolean).map(l => `<div class="sub">${esc(l)}</div>`).join('');

    const itemsHtml = bill.items.map(item => {
      const name = item.medicineName.length > 20 ? item.medicineName.slice(0,19) + '…' : item.medicineName;
      return `<div class="receipt-item">
        <span class="ri-name">${esc(name)}</span>
        <span class="ri-qty">${item.quantity}</span>
        <span class="ri-price">&#8377;${Number(item.unitPrice||0).toFixed(2)}</span>
        <span class="ri-total">&#8377;${Number(item.lineTotal||0).toFixed(2)}</span>
      </div>`;
    }).join('');

    const totalUnits  = bill.items.reduce((s, i) => s + i.quantity, 0);
    const grandTotal  = Number(bill.grandTotal || 0).toFixed(2);

    const receiptHtml = `
      <div class="receipt-header">
        <h1>${esc(_pharmacyInfo.name.toUpperCase())}</h1>
        ${pharmacyLines}
      </div>
      <hr class="receipt-dash"/>
      <div class="receipt-datetime">Date: ${dateStr} &nbsp; Time: ${timeStr}</div>
      ${patientLine}
      <hr class="receipt-dash"/>
      <div class="receipt-col-head">
        <span class="rch-name">Item</span>
        <span class="rch-qty">Qty</span>
        <span class="rch-price">Rate</span>
        <span class="rch-total">Amount</span>
      </div>
      ${itemsHtml}
      <hr class="receipt-dash"/>
      <div class="receipt-summary">
        <div class="receipt-row"><span>Items:</span><span>${bill.items.length}</span></div>
        <div class="receipt-row"><span>Total Units:</span><span>${totalUnits}</span></div>
      </div>
      <div class="receipt-grand">
        <span>GRAND TOTAL</span>
        <span>&#8377;${grandTotal}</span>
      </div>
      <hr class="receipt-dash"/>
      <div class="receipt-footer">
        Thank you for choosing ${esc(_pharmacyInfo.name)}!<br/>
        Get Well Soon &#128591;<br/>
        Consult a doctor before taking medicines.
      </div>
      <div class="receipt-rcptno">${rcptNo}</div>
    `;

    document.getElementById('rcpt-preview-content').innerHTML = receiptHtml;
    document.getElementById('rcpt-print-only').innerHTML =
      `<div class="receipt" style="width:76mm;padding:4mm 5mm">${receiptHtml}</div>`;
    document.getElementById('rcpt-backdrop').classList.add('open');
  }

  function closeReceipt() { document.getElementById('rcpt-backdrop').classList.remove('open'); }
  function closeReceiptIfBackdrop(e) { if(e.target===document.getElementById('rcpt-backdrop')) closeReceipt(); }
  function doPrint() {
    document.getElementById('rcpt-print-only').style.display = 'block';
    window.print();
  }
  window.addEventListener('afterprint', () => {
    document.getElementById('rcpt-print-only').style.display = 'none';
  });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeReceipt(); });

  loadHistory();
  if (window.location.hash === '#restocked') switchTab('restocked');
  setInterval(loadHistory, 30000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadHistory();
  });
</script>
<script src="/js/mediflow-brand.js"></script>
<!-- ═══════════ RECEIPT MODAL ═══════════ -->
<div class="rcpt-backdrop" id="rcpt-backdrop" onclick="closeReceiptIfBackdrop(event)">
  <div class="rcpt-modal">
    <div class="rcpt-modal-head">
      <div class="rcpt-modal-title">🖨️ Receipt Preview</div>
      <button class="rcpt-modal-close" onclick="closeReceipt()">✕</button>
    </div>
    <div class="rcpt-modal-body">
      <div class="rcpt-preview-wrap">
        <div class="receipt" id="rcpt-preview-content"></div>
      </div>
      <div class="rcpt-actions">
        <button class="rcpt-print-btn" onclick="doPrint()">🖨️ Print Bill</button>
        <button class="rcpt-cancel-btn" onclick="closeReceipt()">Cancel</button>
      </div>
    </div>
  </div>
</div>
<div id="rcpt-print-only" style="display:none"></div>

</body>
</html>
