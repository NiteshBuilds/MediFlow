<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --teal:#0d6b6e;--teal-dk:#094a4c;--teal-md:#0f8a8e;--teal-lt:#e0f4f4;
      --amber:#e8870a;--amber-lt:#fef3e2;
      --green:#1a7a4a;--green-lt:#e3f5ec;
      --red:#c0392b;--red-lt:#fdecea;
      --purple:#6c3fc5;--purple-lt:#f0ebff;
      --bg:#f0f4f5;--surface:#fff;--surface2:#f7fafa;
      --text:#0f2b2d;--text-2:#3a5a5c;--muted:#7a9ea0;
      --border:#d4e6e7;--border-dk:#b8d4d5;
      --radius:12px;--radius-sm:8px;--radius-lg:16px;
      --shadow-sm:0 1px 4px rgba(13,107,110,.08);--shadow-md:0 4px 16px rgba(13,107,110,.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── LOGIN SCREEN ── */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--shadow-md);animation:fadeUp .3s ease}
    .login-logo{font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:700;color:var(--teal-dk);margin-bottom:.25rem;display:flex;align-items:center;gap:.5rem}
    .login-sub{font-size:.82rem;color:var(--muted);margin-bottom:2rem}
    .field{margin-bottom:1.1rem}
    .field label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.36rem}
    .field input{width:100%;padding:.68rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;background:var(--surface2);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .field input:focus{border-color:var(--teal-md);box-shadow:0 0 0 3px rgba(13,138,142,.1);background:#fff}
    .btn-login{width:100%;padding:.78rem;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.93rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .18s;margin-top:.4rem}
    .btn-login:hover{background:var(--teal-md)}
    .btn-login:disabled{opacity:.55;cursor:not-allowed}
    .login-err{background:var(--red-lt);color:var(--red);border:1px solid #f5c6c2;border-radius:var(--radius-sm);padding:.6rem .9rem;font-size:.82rem;font-weight:600;display:none;margin-bottom:1rem}
    .login-err.show{display:block}

    /* ── ADMIN DASHBOARD ── */
    #admin-screen{display:none}
    .topbar{background:#071618;height:58px;padding:0 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .topbar-logo{font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:.5rem}
    .topbar-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:999px;text-transform:uppercase;letter-spacing:.06em}
    .topbar-right{display:flex;align-items:center;gap:.75rem}
    .admin-email{font-size:.78rem;color:rgba(255,255,255,.45)}
    .btn-logout{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.35);color:#ff8a80;font-size:.78rem;font-weight:600;padding:.35rem .8rem;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;transition:all .18s}
    .btn-logout:hover{background:rgba(192,57,43,.35)}

    .content{padding:1.75rem;max-width:1400px;margin:0 auto}

    /* ── STAT CARDS ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.75rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;box-shadow:var(--shadow-sm);animation:fadeUp .3s ease both}
    .stat-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem}
    .stat-value{font-family:'Sora',sans-serif;font-size:2rem;font-weight:700;color:var(--teal-dk);line-height:1}
    .stat-card.amber .stat-value{color:var(--amber)}
    .stat-card.green .stat-value{color:var(--green)}
    .stat-card.purple .stat-value{color:var(--purple)}

    /* ── SEARCH + FILTER ── */
    .toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.2rem;flex-wrap:wrap}
    .search-wrap{flex:1;min-width:240px;position:relative}
    .search-wrap input{width:100%;padding:.6rem .9rem .6rem 2.2rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;background:var(--surface);outline:none;transition:border-color .2s}
    .search-wrap input:focus{border-color:var(--teal-md);box-shadow:0 0 0 3px rgba(13,138,142,.1)}
    .search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none}
    .sort-select{padding:.6rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.82rem;font-family:inherit;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
    .sort-select:focus{border-color:var(--teal-md)}
    .refresh-btn{display:flex;align-items:center;gap:.35rem;padding:.6rem 1rem;background:var(--teal-lt);color:var(--teal-dk);border:1px solid var(--border-dk);border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .18s;white-space:nowrap}
    .refresh-btn:hover{background:var(--teal-lt);border-color:var(--teal-md)}
    .count-label{font-size:.8rem;color:var(--muted);white-space:nowrap}

    /* ── PHARMACY CARDS ── */
    .pharmacy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:1rem}
    .pharmacy-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);animation:fadeUp .3s ease both;transition:box-shadow .2s,border-color .2s}
    .pharmacy-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-dk)}

    .pc-head{padding:.9rem 1.2rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.5rem}
    .pc-pharmacy-name{font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;color:var(--teal-dk)}
    .pc-owner{font-size:.75rem;color:var(--muted);margin-top:.1rem}
    .pc-status{display:flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:999px;flex-shrink:0}
    .pc-status.active{background:var(--green-lt);color:var(--green)}
    .pc-status.idle{background:var(--amber-lt);color:var(--amber)}
    .pc-status.new{background:var(--teal-lt);color:var(--teal-dk)}
    .pc-status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

    .pc-body{padding:1rem 1.2rem}
    .pc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.9rem}
    .pc-info-item{}
    .pc-info-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.15rem}
    .pc-info-value{font-size:.8rem;color:var(--text);font-weight:500;word-break:break-all}
    .pc-info-value.mono{font-family:monospace;font-size:.78rem;background:var(--teal-lt);padding:.1rem .4rem;border-radius:4px;color:var(--teal-dk)}

    .pc-stats{display:flex;gap:.5rem;margin-bottom:.85rem;flex-wrap:wrap}
    .pc-stat{flex:1;min-width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .65rem;text-align:center}
    .pc-stat-val{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:var(--teal-dk);line-height:1}
    .pc-stat-lbl{font-size:.63rem;color:var(--muted);margin-top:.18rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

    .pc-footer{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem;border-top:1px solid var(--border);background:var(--surface2)}
    .pc-reg-date{font-size:.72rem;color:var(--muted)}
    .pc-last-active{font-size:.72rem;color:var(--muted);text-align:right}
    .btn-view-bills{background:var(--teal);color:#fff;border:none;border-radius:6px;padding:.32rem .75rem;font-size:.75rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .18s}
    .btn-view-bills:hover{background:var(--teal-md)}

    /* ── BILLS MODAL ── */
    .modal-backdrop{position:fixed;inset:0;background:rgba(5,20,22,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .22s}
    .modal-backdrop.open{opacity:1;pointer-events:auto}
    .modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:680px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(13,107,110,.22);transform:translateY(16px);transition:transform .25s,opacity .25s;opacity:0}
    .modal-backdrop.open .modal{transform:translateY(0);opacity:1}
    .modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .modal-title{font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
    .modal-close{background:none;border:none;font-size:1.3rem;color:var(--muted);cursor:pointer;padding:.2rem .4rem;border-radius:6px;transition:all .15s;line-height:1}
    .modal-close:hover{background:var(--red-lt);color:var(--red)}
    .modal-body{padding:1.2rem;overflow-y:auto;flex:1}

    .bill-item{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.75rem;overflow:hidden}
    .bill-head{display:flex;align-items:center;justify-content:space-between;padding:.6rem .9rem;background:var(--surface2);border-bottom:1px solid var(--border)}
    .bill-patient{font-size:.8rem;font-weight:600;color:var(--text)}
    .bill-meta{font-size:.72rem;color:var(--muted)}
    .bill-total{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;color:var(--teal-dk)}
    .bill-rows{padding:.5rem .9rem}
    .bill-row{display:flex;justify-content:space-between;font-size:.78rem;padding:.22rem 0;border-bottom:1px solid var(--border)}
    .bill-row:last-child{border-bottom:none}
    .bill-row-name{color:var(--text);font-weight:500}
    .bill-row-amt{color:var(--text-2);font-weight:600}

    /* ── EMPTY / LOADING ── */
    .empty-state{text-align:center;padding:3rem;color:var(--muted)}
    .empty-icon{font-size:2.5rem;margin-bottom:.65rem}
    .loading-row{text-align:center;padding:2.5rem;color:var(--muted);font-size:.88rem}

    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💊 MediFlow <span class="topbar-badge" style="font-size:.65rem;background:rgba(13,107,110,.1);color:var(--teal-dk);border:1px solid var(--border-dk)">Admin</span></div>
    <div class="login-sub">Sign in to the admin dashboard</div>
    <div class="login-err" id="login-err"></div>
    <div class="field">
      <label>Admin Email</label>
      <input type="email" id="admin-email" placeholder="admin@example.com" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="admin-password" placeholder="Enter admin password"/>
    </div>
    <button class="btn-login" id="login-btn" onclick="doAdminLogin()">Sign In →</button>
  </div>
</div>

<!-- ── ADMIN DASHBOARD ── -->
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-logo">
      💊 MediFlow
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <span class="admin-email" id="admin-email-label"></span>
      <button class="btn-logout" onclick="doAdminLogout()">Sign Out</button>
    </div>
  </div>

  <div class="content">

    <!-- Stat cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Pharmacies</div>
        <div class="stat-value" id="stat-pharmacies">—</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Total Medicines</div>
        <div class="stat-value" id="stat-medicines">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Total Bills</div>
        <div class="stat-value" id="stat-bills">—</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Total Restocks</div>
        <div class="stat-value" id="stat-restocks">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search pharmacy, owner, email, phone…" oninput="filterCards()"/>
      </div>
      <select class="sort-select" id="sort-select" onchange="sortAndRender()">
        <option value="newest">Newest registered</option>
        <option value="oldest">Oldest registered</option>
        <option value="most-bills">Most bills</option>
        <option value="last-active">Last active</option>
        <option value="name">Pharmacy name A–Z</option>
      </select>
      <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
      <span class="count-label" id="count-label"></span>
    </div>

    <!-- Pharmacy cards -->
    <div class="pharmacy-grid" id="pharmacy-grid">
      <div class="loading-row">⏳ Loading…</div>
    </div>

  </div>
</div>

<!-- Bills modal -->
<div class="modal-backdrop" id="bills-modal" onclick="closeBillsIfBackdrop(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Recent Bills</div>
      <button class="modal-close" onclick="closeBillsModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  let _allPharmacies = [];

  // ── Admin login ──────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none')
      doAdminLogin();
  });

  async function doAdminLogin() {
    const email    = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const btn      = document.getElementById('login-btn');
    const errEl    = document.getElementById('login-err');
    errEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = '⚠️ Enter email and password.'; errEl.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res  = await fetch('/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Invalid credentials.'; errEl.classList.add('show'); btn.disabled = false; btn.textContent = 'Sign In →'; return; }
      document.getElementById('admin-email-label').textContent = email;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadDashboard();
    } catch (_) {
      errEl.textContent = '❌ Server unreachable.'; errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  async function doAdminLogout() {
    await fetch('/admin/logout', { method: 'POST' });
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-email').value = '';
    document.getElementById('admin-password').value = '';
  }

  // ── Load dashboard ───────────────────────────────────────
  async function loadDashboard() {
    await Promise.all([loadStats(), loadPharmacies()]);
  }

  async function loadStats() {
    try {
      const res  = await fetch('/admin/stats');
      if (res.status === 401) return;
      const data = await res.json();
      document.getElementById('stat-pharmacies').textContent = data.totalPharmacies ?? '—';
      document.getElementById('stat-medicines').textContent  = data.totalMedicines  ?? '—';
      document.getElementById('stat-bills').textContent      = data.totalBills      ?? '—';
      document.getElementById('stat-restocks').textContent   = data.totalRestocks   ?? '—';
    } catch (_) {}
  }

  async function loadPharmacies() {
    const grid = document.getElementById('pharmacy-grid');
    grid.innerHTML = '<div class="loading-row">⏳ Loading pharmacies…</div>';
    try {
      const res  = await fetch('/admin/pharmacies');
      if (res.status === 401) return;
      _allPharmacies = await res.json();
      sortAndRender();
    } catch (_) {
      grid.innerHTML = '<div class="loading-row">❌ Could not load pharmacies.</div>';
    }
  }

  // ── Filter + sort ────────────────────────────────────────
  function filterCards() { sortAndRender(); }

  function sortAndRender() {
    const q    = document.getElementById('search-input').value.trim().toLowerCase();
    const sort = document.getElementById('sort-select').value;

    let list = q ? _allPharmacies.filter(p =>
      (p.pharmacyName || '').toLowerCase().includes(q) ||
      (p.name         || '').toLowerCase().includes(q) ||
      (p.email        || '').toLowerCase().includes(q) ||
      (p.pharmacyPhone|| '').toLowerCase().includes(q) ||
      (p.pharmacyAddress||'').toLowerCase().includes(q)
    ) : [..._allPharmacies];

    if (sort === 'newest')      list.sort((a,b) => new Date(b.registeredAt) - new Date(a.registeredAt));
    else if (sort === 'oldest') list.sort((a,b) => new Date(a.registeredAt) - new Date(b.registeredAt));
    else if (sort === 'most-bills') list.sort((a,b) => b.billCount - a.billCount);
    else if (sort === 'last-active') list.sort((a,b) => new Date(b.lastActiveAt||0) - new Date(a.lastActiveAt||0));
    else if (sort === 'name')   list.sort((a,b) => (a.pharmacyName||a.name).localeCompare(b.pharmacyName||b.name));

    document.getElementById('count-label').textContent = `${list.length} pharmac${list.length === 1 ? 'y' : 'ies'}`;
    renderCards(list);
  }

  function renderCards(list) {
    const grid = document.getElementById('pharmacy-grid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🏥</div><p>No pharmacies found.</p></div>';
      return;
    }
    grid.innerHTML = list.map(p => {
      const regDate    = p.registeredAt ? new Date(p.registeredAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
      const lastActive = p.lastActiveAt  ? timeAgo(p.lastActiveAt) : 'No activity yet';
      const lastBill   = p.lastBillAt    ? timeAgo(p.lastBillAt)   : 'Never';

      // Status: active if billed in last 7 days, idle if registered >7 days ago with no bills, new if registered <3 days
      const daysSinceReg   = p.registeredAt  ? (Date.now() - new Date(p.registeredAt)) / 86400000  : 999;
      const daysSinceBill  = p.lastBillAt    ? (Date.now() - new Date(p.lastBillAt))   / 86400000  : 999;
      const status = daysSinceBill <= 7 ? 'active' : daysSinceReg <= 3 ? 'new' : 'idle';
      const statusLabel = status === 'active' ? '● Active' : status === 'new' ? '★ New' : '○ Idle';

      return `
      <div class="pharmacy-card">
        <div class="pc-head">
          <div>
            <div class="pc-pharmacy-name">${esc(p.pharmacyName !== '—' ? p.pharmacyName : p.name)}</div>
            <div class="pc-owner">👤 ${esc(p.name)}</div>
          </div>
          <div class="pc-status ${status}">${statusLabel}</div>
        </div>
        <div class="pc-body">
          <div class="pc-stats">
            <div class="pc-stat"><div class="pc-stat-val">${p.medicineCount}</div><div class="pc-stat-lbl">Medicines</div></div>
            <div class="pc-stat"><div class="pc-stat-val">${p.billCount}</div><div class="pc-stat-lbl">Bills</div></div>
            <div class="pc-stat"><div class="pc-stat-val">${p.restockCount}</div><div class="pc-stat-lbl">Restocks</div></div>
            <div class="pc-stat"><div class="pc-stat-val">${p.staffCount}</div><div class="pc-stat-lbl">Staff</div></div>
          </div>
          <div class="pc-info-grid">
            <div class="pc-info-item"><div class="pc-info-label">Email</div><div class="pc-info-value">${esc(p.email)}</div></div>
            <div class="pc-info-item"><div class="pc-info-label">Phone</div><div class="pc-info-value">${esc(p.pharmacyPhone)}</div></div>
            <div class="pc-info-item"><div class="pc-info-label">Address</div><div class="pc-info-value">${esc(p.pharmacyAddress)}</div></div>
            <div class="pc-info-item"><div class="pc-info-label">License</div><div class="pc-info-value mono">${esc(p.pharmacyLicense)}</div></div>
            <div class="pc-info-item"><div class="pc-info-label">Last Bill</div><div class="pc-info-value">${lastBill}</div></div>
            <div class="pc-info-item"><div class="pc-info-label">Pharmacy Email</div><div class="pc-info-value">${esc(p.pharmacyEmail)}</div></div>
          </div>
        </div>
        <div class="pc-footer">
          <div>
            <div class="pc-reg-date">📅 Registered: ${regDate}</div>
            <div class="pc-last-active" style="text-align:left;margin-top:.2rem">🕐 Last active: ${lastActive}</div>
          </div>
          <button class="btn-view-bills" onclick="viewBills('${esc(p._id)}','${esc(p.pharmacyName !== '—' ? p.pharmacyName : p.name)}')">View Bills →</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Bills modal ──────────────────────────────────────────
  async function viewBills(ownerId, pharmacyName) {
    document.getElementById('modal-title').textContent = `${pharmacyName} — Recent Bills`;
    document.getElementById('modal-body').innerHTML    = '<div class="loading-row">⏳ Loading bills…</div>';
    document.getElementById('bills-modal').classList.add('open');
    try {
      const res   = await fetch(`/admin/pharmacy/${ownerId}/bills`);
      const bills = await res.json();
      if (!bills.length) {
        document.getElementById('modal-body').innerHTML = '<div class="empty-state"><div class="empty-icon">🧾</div><p>No bills yet.</p></div>';
        return;
      }
      document.getElementById('modal-body').innerHTML = bills.map(b => {
        const dt = b.createdAt ? new Date(b.createdAt).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
        return `
        <div class="bill-item">
          <div class="bill-head">
            <div>
              <div class="bill-patient">${b.patientName ? '👤 ' + esc(b.patientName) : '<em style="color:var(--muted);font-weight:400">Anonymous</em>'}</div>
              <div class="bill-meta">${dt}</div>
            </div>
            <div class="bill-total">₹${Number(b.grandTotal).toFixed(2)}</div>
          </div>
          <div class="bill-rows">
            ${b.items.map(it => `
              <div class="bill-row">
                <span class="bill-row-name">${esc(it.medicineName)} × ${it.quantity}</span>
                <span class="bill-row-amt">₹${Number(it.lineTotal).toFixed(2)}</span>
              </div>`).join('')}
          </div>
        </div>`;
      }).join('');
    } catch (_) {
      document.getElementById('modal-body').innerHTML = '<div class="loading-row">❌ Could not load bills.</div>';
    }
  }

  function closeBillsModal() { document.getElementById('bills-modal').classList.remove('open'); }
  function closeBillsIfBackdrop(e) { if (e.target === document.getElementById('bills-modal')) closeBillsModal(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBillsModal(); });

  // ── Helpers ──────────────────────────────────────────────
  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60)    return `${diff}s ago`;
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800)return `${Math.floor(diff/86400)}d ago`;
    return new Date(dateStr).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Auto-refresh stats every 60 seconds
  setInterval(() => {
    if (document.getElementById('admin-screen').style.display !== 'none') loadStats();
  }, 60000);
</script>
</body>
